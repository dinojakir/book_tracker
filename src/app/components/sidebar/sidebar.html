<div class="flex h-full w-full bg-[oklab(0.21_0.00243107_0.0137873_/_0.4)]">
  <div class="flex-1 p-5 border-border sticky top-0 bg-card/80 backdrop-blur-sm z-10">
    <div class="flex items-center gap-2 mb-8">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="w-5 h-5 text-primary"
      >
        <path d="m16 6 4 14"></path>
        <path d="M12 6v14"></path>
        <path d="M8 8v12"></path>
        <path d="M4 4v16"></path>
      </svg>
      <h2 class="font-display text-2xl">Books</h2>
    </div>
    <div class="flex gap-2">
      <input
        class="flex w-full rounded-md border border-input px-3 py-1 h-8 text-sm placeholder:text-muted-foreground bg-transparent shadow-sm transition-colors md:text-sm focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring"
        placeholder="New area…"
        [value]="newArea()"
        (input)="updateNewArea($event)"
      />
      <button
        class="inline-flex items-center justify-center gap-2 whitespace-nowrap font-medium cursor-pointer transition-colors focus-visible:outline-none rounded-md text-xs h-8 px-2 shadow-sm bg-[rgba(35,35,35,0.8)] hover:bg-[rgba(45,45,45,0.8)]"
        (click)="addArea()"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="w-4 h-4"
        >
          <path d="M5 12h14"></path>
          <path d="M12 5v14"></path>
        </svg>
      </button>
    </div>
    <div class="mt-4 py-3 space-y-2" cdkDropList (cdkDropListDropped)="drop($event)">
      @for (area of areaNodes(); track area.id) {
        <div
          cdkDrag
          class="group flex items-center gap-1 px-2 py-1.5 rounded-mf hover:bg-[rgba(30,30,30,0.5)]"
        >
          <button
            cdkDragHandle
            class="opacity-0 group-hover:opacity-100 cursor-grab active:cursor-grabbing text-muted-foreground hover:text-foreground"
            title="Drag to reorder"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="w-3.5 h-3.5"
            >
              <circle cx="9" cy="12" r="1"></circle>
              <circle cx="9" cy="5" r="1"></circle>
              <circle cx="9" cy="19" r="1"></circle>
              <circle cx="15" cy="12" r="1"></circle>
              <circle cx="15" cy="5" r="1"></circle>
              <circle cx="15" cy="19" r="1"></circle>
            </svg>
          </button>
          <button
            class="flex items-center gap-1.5 flex-1 text-left"
            (click)="toggleNodeExpanded(area)"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="w-3.5 h-3.5 text-muted-foreground transition-transform"
              [class.rotate-90]="area.expanded"
            >
              <path d="m9 18 6-6-6-6"></path>
            </svg>
            <span class="font-medium font-sans text-sm text-white">
              {{ area.name }}
            </span>
          </button>

          <div class="ml-auto flex items-center gap-1">
            <button
              class="cursor-pointer opacity-0 group-hover:opacity-100 p-0.5 hover:text-[oklch(var(--orange))] transition-opacity"
              title="Add subject"
              (click)="showAddSubarea(area)"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="w-3.5 h-3.5"
              >
                <path d="M5 12h14"></path>
                <path d="M12 5v14"></path>
              </svg>
            </button>
            <button
              class="cursor-pointer opacity-0 group-hover:opacity-100 p-1 hover:text-red-500 transition-opacity"
              title="Delete subject"
              (click)="deleteArea(area)"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="w-3.5 h-3.5"
              >
                <path d="M10 11v6"></path>
                <path d="M14 11v6"></path>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path>
                <path d="M3 6h18"></path>
                <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              </svg>
            </button>
          </div>
        </div>
        @if (area.addSubarea) {
          <div class="flex gap-2 pl-4">
            <input
              #subareaInput
              class="flex w-full rounded-md border border-input px-3 py-1 h-8 text-sm placeholder:text-muted-foreground bg-transparent shadow-sm transition-colors md:text-sm focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring"
              placeholder="New subarea…"
              [value]="newSubarea()"
              (input)="updateNewSubarea($event)"
            />
            <button
              class="inline-flex items-center justify-center gap-2 whitespace-nowrap font-medium cursor-pointer transition-colors focus-visible:outline-none rounded-md text-xs h-8 px-2 shadow-sm bg-[rgba(35,35,35,0.8)] hover:bg-[rgba(45,45,45,0.8)]"
              (click)="addSubarea(area)"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="w-4 h-4"
              >
                <path d="M5 12h14"></path>
                <path d="M12 5v14"></path>
              </svg>
            </button>
          </div>
        }
        @if (area.expanded) {
          @for (subarea of area.subareas; track subarea.id) {
            <div
              cdkDrag
              class="group flex items-center gap-1 pl-8 pr-2 py-1.5 rounded-mf hover:bg-[rgba(30,30,30,0.5)]"
            >
              <button
                cdkDragHandle
                class="opacity-0 group-hover:opacity-100 cursor-grab active:cursor-grabbing text-muted-foreground hover:text-foreground"
                title="Drag to reorder"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="w-3.5 h-3.5"
                >
                  <circle cx="9" cy="12" r="1"></circle>
                  <circle cx="9" cy="5" r="1"></circle>
                  <circle cx="9" cy="19" r="1"></circle>
                  <circle cx="15" cy="12" r="1"></circle>
                  <circle cx="15" cy="5" r="1"></circle>
                  <circle cx="15" cy="19" r="1"></circle>
                </svg>
              </button>
              <button
                class="flex items-center gap-1.5 flex-1 text-left"
                (click)="toggleNodeExpanded(area)"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="w-3.5 h-3.5 text-muted-foreground transition-transform"
                  [class.rotate-90]="subarea.expanded"
                >
                  <path d="m9 18 6-6-6-6"></path>
                </svg>
                <span class="font-medium font-sans text-sm text-muted">
                  {{ subarea.name }}
                </span>
              </button>

              <div class="ml-auto flex items-center gap-1">
                <button
                  class="cursor-pointer opacity-0 group-hover:opacity-100 p-0.5 hover:text-[oklch(var(--orange))] transition-opacity"
                  title="Add subject"
                  (click)="showAddSubarea(area)"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="w-3.5 h-3.5"
                  >
                    <path d="M5 12h14"></path>
                    <path d="M12 5v14"></path>
                  </svg>
                </button>
                <button
                  class="cursor-pointer opacity-0 group-hover:opacity-100 p-1 hover:text-red-500 transition-opacity"
                  title="Delete subject"
                  (click)="deleteArea(area)"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="w-3.5 h-3.5"
                  >
                    <path d="M10 11v6"></path>
                    <path d="M14 11v6"></path>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path>
                    <path d="M3 6h18"></path>
                    <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                  </svg>
                </button>
              </div>
            </div>
            @if (subarea.addSubarea) {
              <div class="flex gap-2 pl-4">
                <input
                  #bookInput
                  class="flex w-full rounded-md border border-input px-3 py-1 h-8 text-sm placeholder:text-muted-foreground bg-transparent shadow-sm transition-colors md:text-sm focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring"
                  placeholder="New subarea…"
                  [value]="newSubarea()"
                  (input)="updateNewSubarea($event)"
                />
                <button
                  class="inline-flex items-center justify-center gap-2 whitespace-nowrap font-medium cursor-pointer transition-colors focus-visible:outline-none rounded-md text-xs h-8 px-2 shadow-sm bg-[rgba(35,35,35,0.8)] hover:bg-[rgba(45,45,45,0.8)]"
                  (click)="addSubarea(area)"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="w-4 h-4"
                  >
                    <path d="M5 12h14"></path>
                    <path d="M12 5v14"></path>
                  </svg>
                </button>
              </div>
            }
          }
        }
      }
    </div>
  </div>
</div>
